<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Access Denied</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Share Tech Mono',monospace;background:#050a0f;color:#c8dae8;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;}
.box{max-width:400px;padding:0 24px;}
.icon{font-size:4rem;margin-bottom:20px;}
h1{font-family:'Rajdhani',sans-serif;font-size:2.5rem;color:#ff4060;letter-spacing:4px;margin-bottom:10px;}
p{color:#5a7a94;margin-bottom:28px;line-height:1.7;}
a{display:inline-block;padding:10px 24px;border-radius:7px;background:#00d4ff;color:#050a0f;font-family:'Rajdhani',sans-serif;font-weight:700;text-decoration:none;letter-spacing:1px;}
</style>
</head>
<body>
<div class="box">
  <div class="icon">&#128683;</div>
  <h1>ACCESS DENIED</h1>
  <p>You don't have permission to access this page.<br>Admin privileges required.</p>
  <a href="/">&#8592; Go Back</a>
</div>
</body>
</html>
